services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_music_dev}
      POSTGRES_USER: ${POSTGRES_USER:-easy_music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-development-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
      - .env
    dns:
      - 114.114.114.114
      - 223.5.5.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://easy_music:change-me-development-only@postgres:5432/easy_music_dev}
      MEDIA_ROOT: /app/media
    volumes:
      - media_originals:/app/media/originals
      - media_playback:/app/media/playback
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://easy_music:change-me-development-only@postgres:5432/easy_music_dev}
      MEDIA_ROOT: /app/media
    volumes:
      - media_originals:/app/media/originals
      - media_playback:/app/media/playback
    depends_on:
      - postgres
    command: ["python", "-m", "app.worker"]

  worker-loop:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://easy_music:change-me-development-only@postgres:5432/easy_music_dev}
      MEDIA_ROOT: /app/media
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
    volumes:
      - media_originals:/app/media/originals
      - media_playback:/app/media/playback
    depends_on:
      - postgres
    command: ["python", "-m", "app.worker", "--loop"]

volumes:
  postgres_data:
  media_originals:
  media_playback:
